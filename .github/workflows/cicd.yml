name: CI/CD (ECR -> EC2 Self Hosted)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        run: |
          REGISTRY="$(echo '${{ secrets.ECR_REPO }}' | cut -d'/' -f1)"
          aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} \
          | docker login --username AWS --password-stdin "$REGISTRY"

      - name: Build Docker image
        run: |
          docker build -t geo-llm .

      - name: Tag Docker image
        run: |
          docker tag geo-llm:latest ${{ secrets.ECR_REPO }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ECR_REPO }}:latest

      - name: Stop old container
        run: |
          docker stop geo-llm || true
          docker rm geo-llm || true

      - name: Pull latest image
        run: |
          docker pull ${{ secrets.ECR_REPO }}:latest

      - name: Ensure cache directory
        run: |
          sudo mkdir -p /opt/geo-llm/cache
          sudo chown -R ubuntu:ubuntu /opt/geo-llm

      - name: Run new container
        run: |
          docker run -d \
          --name geo-llm \
          --restart unless-stopped \
          -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
          -e QDRANT_URL=${{ secrets.QDRANT_URL }} \
          -e QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }} \
          -v /opt/geo-llm/cache:/root/.cache \
          -p 80:8000 \
          ${{ secrets.ECR_REPO }}:latest

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost/health